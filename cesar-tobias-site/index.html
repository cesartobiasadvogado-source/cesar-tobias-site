<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0B1929;
      color: #F0EDE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-mark {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.6);
      margin-bottom: 16px;
    }

    /* Nome */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 500;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-align: center;
    }
    .title {
      font-size: 10px;
      letter-spacing: 3px;
      color: #C9A84C;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 6px;
      text-align: center;
    }
    .oab {
      font-size: 12px;
      color: rgba(184,197,214,0.6);
      letter-spacing: 1px;
      margin-bottom: 28px;
      text-align: center;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: #C9A84C;
      opacity: 0.5;
      margin-bottom: 28px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #132236;
      border: 0.5px solid rgba(184,197,214,0.12);
      border-radius: 12px;
      padding: 14px 18px;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .link-btn:hover {
      background: #1C3050;
      border-color: rgba(201,168,76,0.3);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(201,168,76,0.1);
      border: 0.5px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg {
      width: 18px;
      height: 18px;
      stroke: #C9A84C;
    }

    .link-text { flex: 1; }
    .link-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(184,197,214,0.55);
      text-transform: uppercase;
      margin-bottom: 3px;
      font-weight: 400;
    }
    .link-value {
      font-size: 14px;
      color: #D8E2EE;
      font-weight: 400;
    }

    .link-chevron {
      color: rgba(184,197,214,0.35);
      font-size: 16px;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 36px;
      font-size: 10px;
      color: rgba(184,197,214,0.25);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
